<svg xmlns="http://www.w3.org/2000/svg" width="960" height="860" viewBox="0 0 960 860">
  <defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&amp;display=swap');
  </style>
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#131210"/>
      <stop offset="100%" style="stop-color:#0f0e0d"/>
    </linearGradient>
    <radialGradient id="bg_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#b5561f;stop-opacity:0.12"/>
      <stop offset="60%"  style="stop-color:#b5561f;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#b5561f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent_line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#b5561f;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#b5561f;stop-opacity:1"/>
      <stop offset="70%"  style="stop-color:#b5561f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b5561f;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="surface_fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#181614;stop-opacity:0"/>
      <stop offset="6%"   style="stop-color:#181614;stop-opacity:1"/>
      <stop offset="94%"  style="stop-color:#181614;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#181614;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="clipMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4f2ee"/>
      <stop offset="45%"  stop-color="#d8d4cc"/>
      <stop offset="100%" stop-color="#b4b0a8"/>
    </linearGradient>
    <linearGradient id="paperEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="rgba(0,0,0,0.07)"/>
      <stop offset="10%" stop-color="rgba(0,0,0,0.00)"/>
    </linearGradient>
    <filter id="iconShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.8" stdDeviation="1.8"
        flood-color="rgba(0,0,0,0.38)" flood-opacity="1"/>
    </filter>
    <clipPath id="card_clip">
      <!-- Clip starts at y=410 (first data row, after header) so the row highlight
           never touches the rounded top corners of the card -->
      <rect x="80" y="410" width="800" height="324" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="960" height="860" fill="url(#bg_gradient)"/>
  <ellipse cx="480" cy="130" rx="380" ry="160" fill="url(#bg_glow)"/>

  <!--
    Inline header group (icon + wordmark on same baseline row):
      Icon: 72×72 (larger for the readme banner)
      Gap: 18px
      "Sto" @ Poppins 800 86px ≈ 144px
      "ckra" @ Poppins 800 86px ≈ 164px
      Total: 72 + 18 + 144 + 164 = 402px
      Group start x = (960 − 402) / 2 = 279
      Row vertical center = 130px
      Icon y = 130 − 36 = 94  (icon center at y=130)
      Text baseline = 130 + 30 = 160  (cap-height center at ~130)
  -->

  <!-- Icon @ x=279, y=93
       At 86px Poppins 800: cap-height ≈ 62px → text top ≈ baseline(160)−62 = 98
       Icon center should match cap-height center: 98 + 31 = 129 → icon top = 129−36 = 93 -->
  <g transform="translate(279, 93)">
    <rect width="72" height="72" rx="16" fill="#b5561f"/>
    <g transform="rotate(3, 36, 38.5)" filter="url(#iconShadow)">
      <!-- Board -->
      <rect x="19.5" y="18" width="33" height="40.5" rx="2.7" fill="white" opacity="0.96"/>
      <rect x="19.5" y="18" width="33" height="40.5" rx="2.7" fill="url(#paperEdge)"/>
      <!-- Clip -->
      <rect x="29.4" y="13.5" width="13.2" height="5.1" rx="2.25" fill="url(#clipMetal)"/>
      <rect x="30.3" y="14.85" width="11.4" height="2.25" rx="1.125" fill="rgba(140,134,120,0.45)"/>
      <circle cx="36" cy="11.1" r="2.1" fill="none" stroke="url(#clipMetal)" stroke-width="1.95"/>
      <!-- Header strip -->
      <rect x="21" y="19.5" width="30" height="7.8" rx="1.35" fill="rgba(181,86,31,0.09)"/>
      <!-- Stkr monogram -->
      <text x="36" y="25.2" font-family="Poppins,system-ui,sans-serif" font-weight="800"
        font-size="5.85" fill="rgba(181,86,31,0.82)" text-anchor="middle" letter-spacing="-0.225">Stkr</text>
      <!-- Row 1 — checked -->
      <rect x="23.4" y="31.2" width="4.35" height="4.35" rx="0.9"
        fill="rgba(181,86,31,0.11)" stroke="rgba(181,86,31,0.32)" stroke-width="0.825"/>
      <polyline points="24.15,33.6 25.32,34.98 27.15,32.25"
        stroke="rgba(181,86,31,0.88)" stroke-width="1.08"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="29.7" y="32.55" width="13.8" height="1.65" rx="0.825" fill="rgba(0,0,0,0.16)"/>
      <!-- Row 2 — checked -->
      <rect x="23.4" y="39" width="4.35" height="4.35" rx="0.9"
        fill="rgba(181,86,31,0.11)" stroke="rgba(181,86,31,0.32)" stroke-width="0.825"/>
      <polyline points="24.15,41.4 25.32,42.78 27.15,40.05"
        stroke="rgba(181,86,31,0.88)" stroke-width="1.08"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="29.7" y="40.35" width="12" height="1.65" rx="0.825" fill="rgba(0,0,0,0.16)"/>
      <!-- Row 3 — unchecked -->
      <rect x="23.4" y="46.8" width="4.35" height="4.35" rx="0.9"
        fill="none" stroke="rgba(181,86,31,0.32)" stroke-width="0.825"/>
      <rect x="29.7" y="48.15" width="15" height="1.65" rx="0.825" fill="rgba(0,0,0,0.28)"/>
    </g>
  </g>

  <!-- Wordmark — plain fill, NO filter/glow, inline with icon -->
  <!-- Wordmark — single text element, tspan for split color, no gap -->
  <text x="369" y="160"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="86" font-weight="800" letter-spacing="-4"><tspan fill="#b5561f">Sto</tspan><tspan fill="#f0ede8">ckra</tspan></text>

  <!-- Slogan -->
  <text x="480" y="194"
    text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="16" font-weight="400" letter-spacing="0.3"
    fill="#6b6560">Tu negocio, sin caos.</text>

  <!-- Accent line -->
  <rect x="370" y="214" width="220" height="1" fill="url(#accent_line)" rx="0.5"/>

  <!-- ══ STACK CHIPS ══════════════════════════════════════════ -->
  <text x="480" y="258"
    text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="600" letter-spacing="2.5"
    fill="#b5561f">STACK</text>

  <!-- 5 chips × 100px + 4 × 12px gap = 548px → start x = (960−548)/2 = 206 -->
  <rect x="206" y="271" width="100" height="28" rx="14" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="256" y="289" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" fill="#f0ede8">Flutter</text>

  <rect x="318" y="271" width="100" height="28" rx="14" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="368" y="289" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" fill="#f0ede8">Supabase</text>

  <rect x="430" y="271" width="100" height="28" rx="14" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="480" y="289" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" fill="#f0ede8">Stripe</text>

  <rect x="542" y="271" width="100" height="28" rx="14" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="592" y="289" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" fill="#f0ede8">Firebase</text>

  <rect x="654" y="271" width="100" height="28" rx="14" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="704" y="289" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" fill="#f0ede8">Resend</text>

  <!-- ══ ROADMAP TABLE ════════════════════════════════════════ -->
  <text x="480" y="346"
    text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="600" letter-spacing="2.5"
    fill="#b5561f">ROADMAP</text>

  <!-- Table card -->
  <rect x="80" y="362" width="800" height="372" rx="16"
    fill="url(#surface_fade)" stroke="#2a2826" stroke-width="1"/>

  <g clip-path="url(#card_clip)">
    <!-- Vertical separators -->
    <line x1="200" y1="362" x2="200" y2="734" stroke="#2a2826" stroke-width="0.75"/>
    <line x1="380" y1="362" x2="380" y2="734" stroke="#2a2826" stroke-width="0.75"/>
    <!-- Horizontal separators -->
    <line x1="80" y1="410" x2="880" y2="410" stroke="#2a2826" stroke-width="0.75"/>
    <line x1="80" y1="472" x2="880" y2="472" stroke="#2a2826" stroke-width="0.75"/>
    <line x1="80" y1="534" x2="880" y2="534" stroke="#2a2826" stroke-width="0.75"/>
    <line x1="80" y1="596" x2="880" y2="596" stroke="#2a2826" stroke-width="0.75"/>
    <line x1="80" y1="658" x2="880" y2="658" stroke="#2a2826" stroke-width="0.75"/>
    <!-- Phase 1 active highlight -->
    <rect x="80" y="410" width="800" height="62" fill="#b5561f" opacity="0.05"/>
    <rect x="80" y="410" width="3"   height="62" fill="#b5561f"/>
  </g>

  <!-- Column headers -->
  <text x="140" y="391" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="600" letter-spacing="1.5" fill="#b5561f">PHASE</text>
  <text x="290" y="391" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="600" letter-spacing="1.5" fill="#b5561f">NAME</text>
  <text x="630" y="391" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="600" letter-spacing="1.5" fill="#b5561f">MODULES</text>

  <!-- Phase 1 — active -->
  <text x="140" y="447" text-anchor="middle"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="22" font-weight="700" fill="#b5561f">1</text>
  <text x="290" y="440" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="14" font-weight="600" fill="#f0ede8">Core</text>
  <text x="290" y="458" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="400" fill="#b5561f" letter-spacing="0.5">In development</text>
  <text x="630" y="447" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="13" font-weight="300" fill="#8a8580">Catalog · Sales · POS · Inventory · Logistics</text>

  <!-- Phase 2 -->
  <text x="140" y="509" text-anchor="middle"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="22" font-weight="700" fill="#363330">2</text>
  <text x="290" y="502" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="14" font-weight="600" fill="#f0ede8">Expansion</text>
  <text x="290" y="520" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="400" fill="#504d4a" letter-spacing="0.5">Planned</text>
  <text x="630" y="509" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="13" font-weight="300" fill="#8a8580">Purchases · Online Store · Loyalty · WhatsApp · Channels</text>

  <!-- Phase 3 -->
  <text x="140" y="565" text-anchor="middle"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="22" font-weight="700" fill="#363330">3</text>
  <text x="290" y="558" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="14" font-weight="600" fill="#f0ede8">Accounting</text>
  <text x="290" y="576" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="400" fill="#504d4a" letter-spacing="0.5">Planned</text>
  <text x="630" y="558" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="13" font-weight="300" fill="#8a8580">Billing (CFDI 4.0 · REP · Nómina · Carta Porte · IEPS) · HR</text>
  <text x="630" y="574" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="300" fill="#504d4a">Comercio Exterior · QR Autofactura</text>

  <!-- Phase 4 -->
  <text x="140" y="627" text-anchor="middle"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="22" font-weight="700" fill="#363330">4</text>
  <text x="290" y="620" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="14" font-weight="600" fill="#f0ede8">Shipping + API</text>
  <text x="290" y="638" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="400" fill="#504d4a" letter-spacing="0.5">Planned</text>
  <text x="630" y="627" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="13" font-weight="300" fill="#8a8580">External Carriers · Public API · CONTPAQi Export</text>

  <!-- Phase 5 -->
  <text x="140" y="689" text-anchor="middle"
    font-family="Poppins,'SF Pro Display','Helvetica Neue',sans-serif"
    font-size="22" font-weight="700" fill="#363330">5</text>
  <text x="290" y="682" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="14" font-weight="600" fill="#f0ede8">Analytics</text>
  <text x="290" y="700" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="11" font-weight="400" fill="#504d4a" letter-spacing="0.5">Planned</text>
  <text x="630" y="689" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="13" font-weight="300" fill="#8a8580">Advanced Analytics · Dashboards</text>
  <!-- Elite badge -->
  <rect x="718" y="716" width="90" height="18" rx="9" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="763" y="729" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="9.5" font-weight="500" letter-spacing="0.8"
    fill="#b5561f">Elite only</text>

  <!-- ══ LINKS ════════════════════════════════════════════════ -->
  <!-- 3 × 160px + 2 × 16px = 512px → start x = (960−512)/2 = 224 -->
  <rect x="224" y="812" width="160" height="30" rx="15" fill="#181614" stroke="#b5561f" stroke-width="1"/>
  <text x="304" y="831" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" font-weight="500" letter-spacing="0.3" fill="#b5561f">stockra.app</text>

  <rect x="400" y="812" width="160" height="30" rx="15" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="480" y="831" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" font-weight="400" letter-spacing="0.3" fill="#8a8580">app.stockra.app</text>

  <rect x="576" y="812" width="160" height="30" rx="15" fill="#181614" stroke="#2a2826" stroke-width="1"/>
  <text x="656" y="831" text-anchor="middle"
    font-family="Poppins,'SF Pro Text','Helvetica Neue',sans-serif"
    font-size="12" font-weight="400" letter-spacing="0.3" fill="#8a8580">dev@stockra.app</text>

</svg>
